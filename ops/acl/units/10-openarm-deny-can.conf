# Drop-in: deny AF_CAN to a service that is not the authorized writer.
#
# Installed as /etc/systemd/system/<other-unit>.service.d/10-openarm-deny-can.conf on
# every host service that has no business on the CAN bus (and, via a system-wide default
# where the host manager supports it, as the baseline). It is the DENY counterpart to
# the writer unit's allowlist: RestrictAddressFamilies=~AF_CAN subtracts AF_CAN from
# whatever the target unit already allows, so any process in that unit gets EAFNOSUPPORT
# the moment it calls socket(AF_CAN, …) — the bus is unreachable to it regardless of the
# cooperative flock, which such a process would never consult in the first place.
#
# This is the enforcement that makes "block unauthorized processes from CAN TX at all"
# (FR-SYS-007(iii)) true rather than aspirational: the writer is allowed AF_CAN by its
# own unit; everyone carrying this drop-in is denied it by the kernel.

[Service]
RestrictAddressFamilies=~AF_CAN
