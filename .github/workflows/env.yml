name: ENV

# WP-ENV-03 — CI pipeline skeleton + pre-merge enforcement. Every job INVOKES an
# existing checker (registry.check, registry.normalization.cli, the ENV checkers) —
# no job defines a new CI-* rule; those are WP-BOOT-03's. Job result maps to
# PASS/FAIL_BLOCKING only (a red job = FAIL_BLOCKING); RETRY_WITH_VARIANT /
# DEGRADED_ACCEPTED are never auto-emitted (see .github/gate_report.py).
#
# Two lanes keep the dependency separation: the light lane installs only [dev] and
# proves registry.check + the plan-machine run WITHOUT torch/lerobot/mujoco; the
# heavy lane installs [dev,robot] and runs the import + contract-regression checks
# for real.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: env-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- light lane: plan-machine only, no robot stack ------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.12
      - run: uv pip install -e ".[dev]"
      - name: Ruff lint
        run: uv run ruff check registry ops dashboard tests
      - name: Ruff format
        run: uv run ruff format --check registry ops dashboard tests
      - name: Types (plan-machine stays light)
        run: uv run mypy registry ops dashboard

  invariant-static:
    # SPINE §5 invariants encoded at the registry level: registry.check runs every
    # CI-01..CI-18 rule, and pytest runs the BOOT-03 fixture corpus that proves each
    # rule fails on a violation. See .github/invariants.md for the invariant map.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.12
      - run: uv pip install -e ".[dev]"
      - name: Registry re-seeds cleanly
        run: uv run python -m registry.ingest.cli --check
      - name: CI-01..CI-18 (build range)
        run: uv run python -m registry.check --all
      - name: Violation fixtures fail their checker (false-negative + ENV fixtures)
        run: uv run python -m pytest -q tests/boot03 tests/env03

  ledger-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.12
      - run: uv pip install -e ".[dev]"
      - name: Normalization ledger + gate map + issued hash
        run: uv run python -m registry.normalization.cli --check

  ownership-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.12
      - run: uv pip install -e ".[dev]"
      - name: Ownership-diff gate self-check (reject + non-over-block fixtures)
        run: uv run python -m pytest -q tests/env03/test_ownership_diff.py
      - name: env_hash issuance is current
        run: uv run python -m registry.env.cli --verify-issued

  pin-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.12
      - run: uv pip install -e ".[dev]"
      - name: LeRobot pin shape + phantom-version rejection
        run: uv run python -m pytest -q tests/env01/test_pin.py tests/env01/test_phantom.py

  # --- heavy lane: robot stack installed, real introspection ----------------
  contract-regress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.12
      - run: uv pip install -e ".[dev,robot]"
      - name: Upstream contract regression (import + introspect)
        run: uv run python -m registry.env.cli --check
      - name: Pin import checks (rollout entry + realsense symbol)
        run: uv run python -m pytest -q tests/env01/test_imports.py tests/env04
