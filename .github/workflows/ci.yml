name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # registry/check.py resolves spine_ref against the commit, so the
          # graph checks need real history rather than a shallow clone.
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.12
      - run: uv pip install -e ".[dev]"

      - name: Lint
        run: uv run ruff check registry ops dashboard tests

      - name: Format check
        run: uv run ruff format --check registry ops dashboard tests

      - name: Types
        run: uv run mypy registry ops dashboard

      - name: Tests
        run: uv run pytest -q

  registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.12
      - run: uv pip install -e ".[dev]"

      - name: Registry matches the corpus
        # --check re-seeds from docs/ and fails if the committed registry drifted.
        # Without this the registry silently stops describing the plan it indexes.
        run: uv run python -m registry.ingest.cli --check

      - name: Generated indexes are not hand-edited
        run: uv run python -m registry.generate.cli --check

      - name: BOOT band acceptance gate
        # Every rule runs; JUDGE_RANGE decides which ones the exit status counts.
        # CI-18 is built but excluded from judgement on purpose: its predicate
        # references this gate, so judging it would make the gate reference
        # itself (02a §-2.2, registry/checks/__init__.py JUDGE_EXCLUDED).
        run: uv run python -m registry.check --all
