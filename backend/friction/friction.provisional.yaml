schema: openarm.friction/v1
model: tau_fric(omega) = Fo + Fv*omega + Fc*tanh(k_eff*omega)
k_convention:
  applied: k_eff = 0.1 * k
  scale: 0.1
  note: The runtime applies k_eff = 0.1 * k (control.cpp ComputeFriction coef_tmp=0.1,
    spec 04 FR-MAN-034); the stored k equals fitted k_eff / 0.1. Writing the raw slope
    as k would deploy a friction ten times too soft in the stiction knee.
status:
  pg_fric_001: NOT_PASSED_DEFERRED_TO_HARDWARE
  provisional: true
  basis: SYNTHETIC_EXCITATION_LOG
  reason: 'Identified from a synthetic excitation log to prove convergence and residual
    separation. This is NOT a PG-FRIC-001 pass: real friction values need real excitation
    logs (WP-2B-06 on hardware) and a PG-J7-001 torque-scale pass, without which the
    identified Fc/Fv/Fo are unverified and the J7 scale may be off by 2x.'
  real_pass_requires:
  - 'PG-J7-001 PASS (RID 23 read: DM4310 vs DM3507 torque scale)'
  - WP-2B-06 real excitation logs captured no-transmit (WP-2B-05)
  - J2 zero +pi/2 shift applied (WP-2B-01)
  reverify_hook:
    module: backend.friction.reverify
    env_var: OPENARM_FRICTION_REAL_FIXTURE
provenance:
  source_repo: bh_open_arm
  commit_sha: SYNTHETIC-NO-HARDWARE
  path: backend/friction/friction.provisional.yaml
  robot_version: '2.0'
  identified_on: '2026-07-22'
identification_band:
  log_freq_hz: 1000.0
  omega_lo_rad_s: 0.01
  omega_hi_rad_s: 2.174428
  knee_omega_rad_s: 0.179773
  knee_resolved: true
  note: 'omega_lo is a function of the logging frequency: a lower rate raises it and
    eats into the stiction knee first (spec 12 §2.1). knee_resolved is false when
    the tightest tanh knee falls below omega_lo, i.e. the low-rate log did not cover
    it.'
