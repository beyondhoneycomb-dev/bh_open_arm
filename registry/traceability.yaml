      리미터 값을 넘지 않음. 셋 중 하나라도 미충족 → 아티팩트 발행 거부 ⑨-b 리미터 아래에서 관절별 지령 vs 실측 속도 추종 오차 기록 + 리미터 초과 지령 0건 로그
