      충돌 검사 없음" UI 문구 실재 ⑨ 🔴 PG-VEL-001 = 도출값 대비 검증(한계 발견 아님): ⑨-a 스윕 3구속 어서트 — 단일 관절 / 기계 구속 / 지령이 부트스트랩
