      심볼 0건(정적검사) ⑩ 트윈 stiff(230) 게인 패리티 어서트, use_velocity_and_torque=false 픽스처 → 트윈 거부 ⑪ 백엔드 기본값 == MuJoCo,
      Isaac 미가용 → 자동 강등 + 사유 기록(조용한 강등 0) ⑫ Isaac을 하드게이트로 지정하는 픽스처 → 거부(09 FR-SIM-135 — 정본 게이트는 MuJoCo)
      ⑬ 백엔드 간 DR 중심값 교차 이식 픽스처 → 거부(09 FR-SIM-092) ⑭ 동시 2모드 활성 픽스처 → 거부 ⑮ 드라이런이 WP-0C-03 수정 MJCF 해시를 참조함
      어서트 — 미수정 자산 위 실행 시도 → 거부(J7 tMax 2배 오차가 토크 검사 ③을 통째로 무효화한다)'
