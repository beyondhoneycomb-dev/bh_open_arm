      실패" 1종 금지) ③ 6검사 중 1건 실패 → 실기 전송 하드 차단 실증(차단 우회 시도 0건 성공) ④ 모달 확인 없는 우회 경로 부재(정적검사 — 09 FR-SIM-033)
      ⑤ 위반 리포트가 {위반 항목, 시뮬 t, 해당 관절, 초과량} 4필드 전량 산출 ⑥ 토크 검사 ③이 implicit 액추에이터에서 무력함을 실증한 뒤, explicit 모델
      또는 get_measured_joint_efforts() 실측 대조로 검출됨을 재실증(09 FR-SIM-133 — 이 확인 없이는 ③이 조용히 통과한다) ⑦ 토크 한계가 ±40/±27/±7
