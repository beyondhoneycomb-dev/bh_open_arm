      CAN 소유권 이양 아님) ⑤-b 🔴 a는 잠정이다: f_max_python을 provisional: true로 발행하고, 이 산출과 그 하류의 stale_on에 PG-RT-001b를
      선언한다(06 CI-11c — 없으면 합성 부하 기반 수치가 최종인 척 살아남는다). 최종 정본은 PG-RT-001b(Wave 3C · WP-3C-02 · 실카메라 5스트림+실라이터+데이터셋+GUI
      동일 프로세스 = 15 §2.10 조건 4 진짜 조건)이며, b는 a를 SUPERSEDED로 무효화할 수 있다. a의 PASS는 "괜찮다"가 아니라 "실기가 뒤집을 때까지
      진행해도 된다"는 뜻이다 ⑥ 조건 4 실측 vs WP-0C-06 합성 부하 대비표 산출 — 합성이 실측을 얼마나 근사했는지 정량화(b가 a를 뒤집을 때 무엇이 틀렸는지 말할
      수 있는 유일한 근거) ⑦ 조건 5로 GIL 기여도 산출, 조건 6으로 RT 승격 이득 산출(0이어도 유효 결과) ⑧ PG-CAN-001 판정: 사이클당 프레임 32 = 패턴
      B 정상 / 16 = 코드경로 변경 또는 측정창 오류 → 원인 규명 전 하류 진행 금지 ⑨ f_max = min(f_max_can, f_max_python) 저장 + 이후
      목표 주파수의 × 0.8 상한 집행기 결선 ⑩ 타깃별 실행(05 NFR-TEL-004) — 최소 제어 호스트 1종에서 실측, x86 전용 결과 발행 금지 ⑪ 산출물 = 히스토그램
      전량(요약통계만 금지)'
  downstream:
