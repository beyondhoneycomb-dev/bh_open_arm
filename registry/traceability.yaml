      심볼 0건(정적검사) ③ 0xFE 송신 지점 = 코드베이스 전체 1곳(grep) ④ 0xAA 송신 0건(정적검사 — firmware별 신뢰 불가) ⑤ enabled 상태에서
      set_zero 시도 → 거부(조용한 skip 0건 — disable 선행 강제 확인) ⑥ 0xFE 후 motor_zero_raw readback 잔차가 관절별 ±0.5°
      이내 — 초과 시 재영점 요구 발동 ⑦ 전원 재인가 → 재연결 → 영점 잔차 재검증 실측: 허용오차 내면 영속성 [확정], 초과면 매 세션 재영점 강제 플래그 ON(둘 다
      유효 결과) ⑧ 디스크 쓰기 중 SIGKILL 주입 100회 → JSON 손상 0건(원자성 증명) ⑨ zero_method 필드가 프로파일에 기록 ⑩ 그리퍼 open/close
      엔드포인트 rad가 디스크 영속 + captured 플래그 ON ⑪ rest 모달이 connect가 아니라 set_zero 단계에 걸림(02 FR-CON-063) — connect
      단계 모달 픽스처 → 거부 ⑫ 양팔 부분 연결(좌 성공/우 실패) 주입 → 명시적 부분 상태 처리(좌 연결 잔존 방치 0건) ⑬ 세션당 connect() 2회 호출 픽스처
      → 거부'
