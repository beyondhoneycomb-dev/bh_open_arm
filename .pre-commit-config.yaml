repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        # The registry is a megabyte of generated YAML; parsing it on every
        # commit costs more than it catches, and the schema check in CI is the
        # real gate for it.
        exclude: ^registry/traceability\.yaml$
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2048]

  - repo: local
    hooks:
      - id: generated-files-are-not-hand-edited
        name: registry/build is generated, not written
        entry: python -m registry.generate.cli --check
        language: system
        pass_filenames: false
        files: ^registry/(build|generate)/
