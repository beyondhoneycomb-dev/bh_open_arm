# WP-ENV-04 — upstream contract-regression facts.
#
# Every fact 16 §10.1/§10.2 and 01 §2.18 cite about the pinned upstream carries a
# check_predicate. The predicate is a symbol/signature/default/source introspection
# in registry.env.upstream (import THEN inspect), never a file-text match at a line
# number. cited_source records where the fact is asserted; check_line records the
# upstream git-tree line the citation used, for provenance only — the predicate does
# not read it. affected_frs is the blast radius reported when a predicate fails.
#
# severity on violation: FAIL_BLOCKING = a premise a downstream WP is built on has
# moved (build must stop + alternate WP); HIGH = a silent-failure defence lost its
# ground; MEDIUM = a numeric/shape fact drifted.

