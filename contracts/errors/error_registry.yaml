# CTR-ERR@v1 — OA-* canonical error-code registry.
#
# Owner: WP-OPS-06 (06 §3.2). This file is the frozen declaration; the
# loader, severity enum, Damiao parser and checkers live in contracts/errors/
# and read this table. Every emission point references a registry symbol —
# an inline code literal is a static-check violation (14 §2.10).
#
# Canon: 14 §2.10 is the single source (not 13). severity is the 4-level
# diagnostic_msgs semantics (14 FR-OPS-017), no ROS 2 runtime dependency.
# The 10 domain prefixes are a closed set: a new domain is a contract bump.
contract: CTR-ERR@v1

# The 4 fixed severity levels. A value outside this set is rejected.
severity_levels:
  OK: 0
  WARN: 1
  ERROR: 2
  STALE: 3

# The closed set of domain prefixes. A code outside these is rejected;
# adding a domain is a CTR-ERR@v(n+1) bump, never an in-place edit.
domains:
  - OA-CAN
  - OA-MOT
  - OA-CTL
  - OA-CAM
  - OA-TEL
  - OA-IK
  - OA-SYS
  - OA-INF
  - OA-DAT
  - OA-ZRO

# The 10 fields every code carries. {hardware_id, first_seen_t, count} are
# runtime-populated (null/0 at definition); the rest are authored here.
fields:
  - code
  - severity
  - message_ko
  - message_en
  - hardware_id
  - subsystem
  - recovery_hint
  - doc_url
  - first_seen_t
  - count

# Damiao ERR nibble <-> OA-MOT-0xx, 1:1 (14 §2.4). Nibble 1 (Enable) is a
# normal state and is intentionally unmapped.
damiao_err_nibble_map:
  - nibble: "0"
    code: OA-MOT-000
    meaning_ko: "실효/미인에이블"
  - nibble: "8"
    code: OA-MOT-008
    meaning_ko: "과전압"
  - nibble: "9"
    code: OA-MOT-009
    meaning_ko: "저전압"
  - nibble: "A"
    code: OA-MOT-00A
    meaning_ko: "과전류"
  - nibble: "B"
    code: OA-MOT-00B
    meaning_ko: "MOS 과온"
  - nibble: "C"
    code: OA-MOT-00C
    meaning_ko: "코일 과온"
  - nibble: "D"
    code: OA-MOT-00D
    meaning_ko: "통신 두절"
  - nibble: "E"
    code: OA-MOT-00E
    meaning_ko: "과부하"

# Codes. 001..006 of OA-SYS carry 14 §2.10's canon meanings; OA-SYS-007..011
# are 01 §4.5 consumer allocations 14 §2.10 does not itself define — see
