# Known, deliberately un-invented-away spec conflicts a human must resolve;
# recorded here so the freeze does not silently paper over them.
_notes:
  - >-
      OA-SYS-001..006 carry 14 §2.10 meanings (disk/OOM/RT/backend-death/
      loop-death/port), which 14's own FR-OPS-045/046/049/064/066 use. 01
      §4.5 numbers OA-SYS-001..006 differently (CAN-lock/link/intruder/zero/
      flag/side); those concepts live under OA-CAN/OA-ZRO/OA-DAT in the 14
      §2.10 canon. 14 §2.10 wins (declared canon); 01 §4.5 needs
      reconciliation.
  - >-
      14 §2.10 labels the domain set '11종' but enumerates 10 (OA-CAN..OA-ZRO);
      every OA-* usage across spec+plan resolves to these 10. The closed set
      is 10.
